<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JaguarSecurity | Inicio de turno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center px-4">
  <main class="w-full max-w-md glass-card p-8">
    <p class="text-xs uppercase tracking-[0.35em] text-cyan-400">JaguarSecurity</p>
    <h1 class="mt-3 text-3xl font-bold text-white">Inicio de turno</h1>
    <p class="mt-2 text-sm text-gray-400">Acceso rápido para registrar el arranque de operaciones.</p>

    <form class="mt-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2" for="operador">Operador</label>
        <input id="operador" type="text" class="form-input" placeholder="Nombre del operador" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2" for="turno">Turno</label>
        <select id="turno" class="form-input">
          <option>Matutino</option>
          <option>Vespertino</option>
          <option selected>Nocturno</option>
        </select>
      </div>
      <button type="submit" class="w-full rounded-xl bg-cyan-500 px-4 py-3 font-semibold text-gray-950 hover:bg-cyan-400 transition">Iniciar turno</button>
      <a href="index.html" class="block text-center text-sm text-yellow-300 hover:text-yellow-200 transition">Volver al dashboard</a>
    </form>
  </main>
</body>
</html>
