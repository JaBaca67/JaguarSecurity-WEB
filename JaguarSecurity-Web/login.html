<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JaguarSecurity | Acceso Operativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center px-4 py-2 md:py-4">

  <div class="max-w-[1250px] w-full min-h-[220px] bg-gray-800 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.6)] overflow-hidden flex flex-col md:flex-row border border-gray-700">

    <div class="flex-1 bg-gray-950 relative overflow-hidden group min-h-[220px] md:min-h-[470px]">

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-[500px] h-[500px] bg-cyan-500 rounded-full blur-[140px] opacity-20 group-hover:opacity-30 transition duration-500"></div>
        </div>

        <div class="absolute inset-0 flex items-center justify-center p-6 md:p-8">
            <img
                src="assets/img/logo_jaguarsecurity.png"
                alt="Logo JaguarSecurity"
                class="
                    w-full
                    h-full
              object-contain
            scale-[0.8]
                    select-none
                    pointer-events-none
                    drop-shadow-[0_0_35px_rgba(34,211,238,0.45)]
                ">
        </div>

    </div>  

    <div class="w-full md:w-[450px] lg:w-[500px] shrink-0 p-8 lg:p-10 bg-gray-800 flex flex-col justify-center">
      <div class="mb-5 rounded-2xl border border-cyan-300/20 bg-cyan-400/5 px-5 py-4 shadow-[0_0_30px_rgba(34,211,238,0.08)]">
        <h2 class="text-3xl font-bold text-cyan-100">Iniciar Turno</h2>
        <p class="text-sm text-cyan-50/80 mt-1.5">Ingresa tus credenciales operativas.</p>
      </div>

      <form id="loginForm" class="space-y-4" novalidate>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5 tracking-wider" for="nombre">Nombre</label>
            <input id="nombre" type="text" class="form-input w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="Ej. José" autocomplete="given-name">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5 tracking-wider" for="apellido">Apellido</label>
            <input id="apellido" type="text" class="form-input w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="Ej. Baca" autocomplete="family-name">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5 tracking-wider" for="usuario">Usuario Red</label>
          <input id="usuario" type="text" class="form-input w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="Ej. jbaca" autocomplete="username">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5 tracking-wider" for="contrasena">Clave de Acceso</label>
          <div class="relative">
            <input id="contrasena" type="password" class="form-input w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 pr-12 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="••••••••" autocomplete="current-password">
            <button id="toggleContrasena" type="button" class="absolute inset-y-0 right-0 flex items-center justify-center px-3 text-gray-400 transition hover:text-cyan-300" aria-label="Mostrar contraseña">
              <svg id="iconoOjoAbierto" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0Z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z" />
              </svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="hidden min-h-[3.5rem] text-sm text-red-300 bg-red-900/20 border border-red-500/30 rounded-lg p-3 text-center flex items-center justify-center">
          Mensaje de error aquí.
        </div>

        <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 rounded-lg mt-4 transition shadow-[0_10px_20px_rgba(8,145,178,0.3)]">
          Autenticar e Iniciar Turno
        </button>
        
      </form>
    </div>

  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>
