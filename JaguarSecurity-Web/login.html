<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JaguarSecurity | Acceso Operativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-4xl w-full bg-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-700">
    
    <div class="md:w-1/2 bg-gray-950 p-10 flex flex-col justify-center items-center text-center relative overflow-hidden">
      <div class="absolute w-64 h-64 bg-cyan-600 rounded-full blur-[100px] opacity-20"></div>
      
      <div class="relative z-10">
        <h1 class="text-4xl font-bold text-white tracking-wider mb-2">JAGUAR<span class="text-cyan-400">SECURITY</span></h1>
        <p class="text-sm text-gray-400 uppercase tracking-widest mb-8">Centro de Operaciones</p>
        
        <div class="w-32 h-32 mx-auto border-2 border-cyan-400/30 rounded-full flex items-center justify-center bg-gray-900/50 shadow-[0_0_15px_rgba(34,211,238,0.2)]">
            <span class="text-cyan-400 font-mono text-xl">SYS_ON</span>
        </div>
        
        <p class="mt-8 text-sm text-gray-400 max-w-xs mx-auto">
          Sistema de bitácora vehicular y control de acceso. Solo personal autorizado.
        </p>
      </div>
    </div>

    <div class="md:w-1/2 p-10">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-white">Iniciar Turno</h2>
        <p class="text-sm text-gray-400 mt-1">Ingresa tus credenciales operativas.</p>
      </div>

      <form id="loginForm" class="space-y-5" novalidate>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1" for="nombre">Nombre</label>
            <input id="nombre" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="Ej. José">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1" for="apellido">Apellido</label>
            <input id="apellido" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="Ej. Baca">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1" for="usuario">Usuario Red</label>
          <input id="usuario" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="Ej. jbaca">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1" for="contrasena">Clave de Acceso</label>
          <input id="contrasena" type="password" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition" placeholder="••••••••">
        </div>

        <div id="loginError" class="hidden text-sm text-red-400 bg-red-900/20 border border-red-500/30 rounded p-3 text-center">
          Mensaje de error aquí.
        </div>

        <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg mt-4 transition shadow-lg shadow-cyan-500/30">
          Autenticar e Iniciar Turno
        </button>
        
      </form>
    </div>
  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>
